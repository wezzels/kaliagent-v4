# Agentic AI - GitLab CI/CD Pipeline
# Version: 0.7.0
# Last Updated: April 16, 2026

stages:
  - lint
  - test
  - build
  - security
  - deploy

# ============================================
# Variables
# ============================================
variables:
  DOCKER_REGISTRY: "idm.wezzel.com:5050"
  DOCKER_IMAGE: "crab-meat-repos/agentic-ai"
  PYTHON_VERSION: "3.12"

# ============================================
# Lint Stage
# ============================================
lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install flake8 black isort mypy
    - flake8 agentic_ai/ --max-line-length=100 --exclude=venv,__pycache__
    - black --check agentic_ai/ tests/
    - isort --check-only agentic_ai/ tests/
    - mypy agentic_ai/ --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================
# Test Stage
# ============================================
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - name: redis:7-alpine
      alias: redis
  before_script:
    - apt-get update && apt-get install -y gcc
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests/ -v --tb=short --cov=agentic_ai --cov-report=xml --cov-report=html
    - coverage report --fail-under=80
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================
# Build Stage
# ============================================
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_REGISTRY/$DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker build -t $DOCKER_REGISTRY/$DOCKER_IMAGE:latest .
    - docker push $DOCKER_REGISTRY/$DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_REGISTRY/$DOCKER_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================
# Security Scan Stage
# ============================================
security-scan:
  stage: security
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install bandit safety
    - bandit -r agentic_ai/ -f json -o bandit-report.json || true
    - safety check --json > safety-report.json || true
  artifacts:
    reports:
      sast: bandit-report.json
    paths:
      - bandit-report.json
      - safety-report.json
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# ============================================
# Deploy - Development
# ============================================
deploy-dev:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context dev-cluster
    - kubectl set image deployment/agentic-ai agentic-ai=$DOCKER_REGISTRY/$DOCKER_IMAGE:$CI_COMMIT_SHA -n agentic-ai-dev
    - kubectl rollout status deployment/agentic-ai -n agentic-ai-dev
  environment:
    name: development
    url: https://dev.agentic-ai.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# ============================================
# Deploy - Staging
# ============================================
deploy-staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context staging-cluster
    - kubectl set image deployment/agentic-ai agentic-ai=$DOCKER_REGISTRY/$DOCKER_IMAGE:$CI_COMMIT_SHA -n agentic-ai-staging
    - kubectl rollout status deployment/agentic-ai -n agentic-ai-staging
  environment:
    name: staging
    url: https://staging.agentic-ai.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  when: manual

# ============================================
# Deploy - Production
# ============================================
deploy-prod:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context prod-cluster
    - kubectl set image deployment/agentic-ai agentic-ai=$DOCKER_REGISTRY/$DOCKER_IMAGE:$CI_COMMIT_SHA -n agentic-ai
    - kubectl rollout status deployment/agentic-ai -n agentic-ai
  environment:
    name: production
    url: https://agentic-ai.example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  when: manual
  needs:
    - build
    - security-scan
