apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentic-ai.fullname" . }}-secrets
  labels:
    {{- include "agentic-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.config.secretKey | default (randAlphaNum 32) | quote }}
  {{- if .Values.postgresql.enabled }}
  database-password: {{ .Values.postgresql.auth.postgresPassword | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  redis-password: {{ .Values.redis.auth.password | default "" | quote }}
  {{- end }}
