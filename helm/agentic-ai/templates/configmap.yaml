apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentic-ai.fullname" . }}-config
  labels:
    {{- include "agentic-ai.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | default "INFO" | quote }}
  JWT_EXPIRY: {{ .Values.config.jwtExpiry | default "3600" | quote }}
  MAX_RETRIES: {{ .Values.config.maxRetries | default "3" | quote }}
  TASK_TIMEOUT: {{ .Values.config.taskTimeout | default "300" | quote }}
  PROMETHEUS_ENABLED: {{ .Values.prometheus.enabled | quote }}
  PROMETHEUS_PORT: {{ .Values.prometheus.port | quote }}
