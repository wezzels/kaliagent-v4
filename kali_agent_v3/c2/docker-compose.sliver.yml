# Sliver C2 Server - Docker Compose Configuration
# Version: 1.0
# Date: April 23, 2026

version: '3.8'

services:
  sliver-server:
    image: sliver/sliver:latest
    container_name: sliver-c2
    hostname: sliver-server
    restart: unless-stopped
    ports:
      # gRPC API
      - "50051:50051"
      # Mutiny (HTTP C2)
      - "8888:8888"
      # DNS C2
      - "53:53/udp"
      # HTTPS C2 (custom)
      - "443:443"
    volumes:
      # Persistent data
      - sliver-data:/root/.sliver
      # TLS certificates
      - ./certs:/etc/sliver/certs:ro
      # Configuration
      - ./sliver-config:/etc/sliver/config:ro
    environment:
      - SLIVER_SERVER_BIND=0.0.0.0
      - SLIVER_SERVER_PORT=50051
      - SLIVER_HTTP_C2_PORT=8888
      - SLIVER_DNS_C2_PORT=53
      - SLIVER_HTTPS_C2_PORT=443
      # Optional: Configure TLS
      - SLIVER_TLS_ENABLED=true
      - SLIVER_TLS_CERT=/etc/sliver/certs/sliver.crt
      - SLIVER_TLS_KEY=/etc/sliver/certs/sliver.key
    networks:
      - c2-network
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  c2-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  sliver-data:
    driver: local
