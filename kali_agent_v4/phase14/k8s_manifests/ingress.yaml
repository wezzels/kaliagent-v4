apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kaliagent-ml-ingress
  namespace: ml-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ml.kaliagent.local
    secretName: kaliagent-ml-tls
  rules:
  - host: ml.kaliagent.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kaliagent-ml-service
            port:
              number: 80
