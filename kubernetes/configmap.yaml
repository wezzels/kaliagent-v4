apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-ai-config
  namespace: agentic-ai
data:
  redis-host: "redis.agentic-ai.svc.cluster.local"
  redis-port: "6379"
  log-level: "INFO"
  max-workers: "10"
  session-timeout-minutes: "30"
  max-session-participants: "50"
  enable-metrics: "true"
  metrics-port: "8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentic-ai-secrets
  namespace: agentic-ai
type: Opaque
stringData:
  database-url: "sqlite:///app/data/agentic.db"
  # Add actual secrets via kubectl create secret or external secrets manager
  # redis-password: ""
  # api-key: ""
  # jwt-secret: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentic-ai
  namespace: agentic-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentic-ai-role
  namespace: agentic-ai
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentic-ai-rolebinding
  namespace: agentic-ai
subjects:
  - kind: ServiceAccount
    name: agentic-ai
    namespace: agentic-ai
roleRef:
  kind: Role
  name: agentic-ai-role
  apiGroup: rbac.authorization.k8s.io
