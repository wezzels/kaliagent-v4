apiVersion: v1
kind: Service
metadata:
  name: agentic-ai
  namespace: agentic-ai
  labels:
    app: agentic-ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: metrics
  selector:
    app: agentic-ai
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-ai-external
  namespace: agentic-ai
  labels:
    app: agentic-ai
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
    - port: 443
      targetPort: 5000
      protocol: TCP
      name: https
  selector:
    app: agentic-ai
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentic-ai-ingress
  namespace: agentic-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - agentic-ai.example.com
      secretName: agentic-ai-tls
  rules:
    - host: agentic-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentic-ai
                port:
                  number: 5000
